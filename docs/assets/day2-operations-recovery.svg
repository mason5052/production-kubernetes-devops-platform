<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 390" role="img" aria-labelledby="title desc">
  <title id="title">Day-2 operations and recovery</title>
  <desc id="desc">An operations recovery loop from alert or user report through triage, recent change review, metrics, logs, mitigation, recovery verification, documentation, and follow-up improvement.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#335c81" />
    </marker>
    <marker id="arrow-soft" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7a8ca3" />
    </marker>
    <style>
      .canvas { fill: #ffffff; }
      .title { fill: #172033; font: 700 28px "Segoe UI", Arial, sans-serif; }
      .subtitle { fill: #536173; font: 400 15px "Segoe UI", Arial, sans-serif; }
      .node { fill: #f7f9fc; stroke: #a9b8cc; stroke-width: 1.5; rx: 8; }
      .node-blue { fill: #eef5ff; stroke: #6c9bd2; }
      .node-green { fill: #eef8f3; stroke: #58a77a; }
      .node-red { fill: #fff1f1; stroke: #d77272; }
      .label { fill: #172033; font: 700 15px "Segoe UI", Arial, sans-serif; }
      .small { fill: #536173; font: 400 12.5px "Segoe UI", Arial, sans-serif; }
      .line { fill: none; stroke: #335c81; stroke-width: 2.2; marker-end: url(#arrow); }
      .feedback { fill: none; stroke: #7a8ca3; stroke-width: 1.8; stroke-dasharray: 8 7; marker-end: url(#arrow-soft); }
      .panel { fill: #fbfcfe; stroke: #d5dde8; stroke-width: 1.2; rx: 8; }
    </style>
  </defs>

  <rect class="canvas" width="1200" height="390" />
  <text class="title" x="40" y="52">Day-2 Operations And Recovery</text>
  <text class="subtitle" x="40" y="78">Operational work continues after deployment through detection, rollback, recovery, documentation, and improvement.</text>

  <rect class="panel" x="40" y="112" width="1120" height="198" />
  <rect class="node node-red" x="70" y="158" width="132" height="70" />
  <text class="label" x="96" y="185">Alert or</text>
  <text class="label" x="92" y="205">user report</text>

  <rect class="node" x="238" y="158" width="132" height="70" />
  <text class="label" x="278" y="185">Triage</text>
  <text class="small" x="266" y="207">severity, scope</text>

  <rect class="node" x="406" y="158" width="148" height="70" />
  <text class="label" x="438" y="185">Recent</text>
  <text class="small" x="430" y="207">deploys and IaC</text>

  <rect class="node node-blue" x="590" y="158" width="132" height="70" />
  <text class="label" x="622" y="185">Metrics</text>
  <text class="small" x="618" y="207">dashboards</text>

  <rect class="node node-blue" x="758" y="158" width="132" height="70" />
  <text class="label" x="794" y="185">Logs</text>
  <text class="small" x="788" y="207">workload clues</text>

  <rect class="node node-green" x="926" y="158" width="132" height="70" />
  <text class="label" x="958" y="185">Mitigate</text>
  <text class="small" x="950" y="207">fix or rollback</text>

  <path class="line" d="M 202 193 H 238" />
  <path class="line" d="M 370 193 H 406" />
  <path class="line" d="M 554 193 H 590" />
  <path class="line" d="M 722 193 H 758" />
  <path class="line" d="M 890 193 H 926" />

  <rect class="node node-green" x="590" y="260" width="132" height="50" />
  <text class="label" x="624" y="283">Verify</text>
  <text class="small" x="614" y="302">recovery</text>
  <rect class="node" x="758" y="260" width="132" height="50" />
  <text class="label" x="786" y="283">Document</text>
  <text class="small" x="790" y="302">cause, actions</text>
  <path class="line" d="M 992 228 C 960 278, 790 286, 722 286" />
  <path class="line" d="M 722 286 H 758" />
  <path class="feedback" d="M 758 286 C 520 350, 214 330, 136 228" />

  <text class="small" x="72" y="346">Practices represented: health checks, rollout monitoring, capacity review, alert triage, incident support, runbook maintenance, restore planning, and cost review.</text>
</svg>
