apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: platform-service-ingress
  namespace: platform-example
spec:
  podSelector:
    matchLabels:
      app: platform-service
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: ingress-system
      ports:
        - protocol: TCP
          port: 8080
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              name: monitoring
      ports:
        - protocol: TCP
          port: 9090
