apiVersion: batch/v1
kind: CronJob
metadata:
  name: automation-worker
  namespace: platform-example
spec:
  schedule: "*/15 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: automation-worker
              image: registry.example.internal/automation-worker:20260614-abcdef0
              imagePullPolicy: IfNotPresent
              env:
                - name: ENVIRONMENT
                  value: example
              resources:
                requests:
                  cpu: 100m
                  memory: 128Mi
                limits:
                  cpu: 500m
                  memory: 512Mi

