apiVersion: v1
kind: Pod
metadata:
  name: good-pod
  namespace: platform-example
  labels:
    platform.example.com/owner: platform-team
    platform.example.com/service: platform-service
    platform.example.com/data-classification: internal
spec:
  containers:
    - name: app
      image: registry.example.internal/platform-service:example
      readinessProbe:
        httpGet:
          path: /healthz
          port: 8080
        initialDelaySeconds: 10
        periodSeconds: 10
      livenessProbe:
        httpGet:
          path: /healthz
          port: 8080
        initialDelaySeconds: 30
        periodSeconds: 20
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 500m
          memory: 512Mi
      securityContext:
        privileged: false
