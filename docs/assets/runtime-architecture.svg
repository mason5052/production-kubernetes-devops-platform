<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 480" role="img" aria-labelledby="t d" width="100%">
  <title id="t">Runtime architecture</title>
  <desc id="d">Runtime architecture in three lanes: source-to-delivery pipeline, AWS foundation provisioned by Terraform, and Kubernetes workloads with metrics, logs, dashboards, alerts, and incident review.</desc>
  <defs>
    <style>
      text{font-family:ui-sans-serif,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
      .t-title{font-size:24px;font-weight:600;fill:#1f2328}
      .t-sub{font-size:13px;font-weight:400;fill:#656d76}
      .t-lane{font-size:12px;font-weight:600;fill:#656d76;letter-spacing:1.2px}
      .t-step{font-size:13px;font-weight:600;fill:#1f2328}
      .t-step-d{font-size:12px;font-weight:400;fill:#656d76}
      .card{fill:#f6f8fa;stroke:#d0d7de;stroke-width:1}
      .lane{fill:#eef1f5;stroke:#d0d7de;stroke-width:1}
      .pill{fill:#ffffff;stroke:#d0d7de;stroke-width:1}
      .n-blue{fill:#ddeefc;stroke:#54aeff;stroke-width:1.4}
      .n-amber{fill:#fbe9c7;stroke:#d4a72c;stroke-width:1.4}
      .n-green{fill:#d7f0de;stroke:#3fb950;stroke-width:1.4}
      .n-red{fill:#fbe0de;stroke:#e5534b;stroke-width:1.4}
      .edge{fill:none;stroke:#57606a;stroke-width:2;marker-end:url(#ah)}
      .edge-d{fill:none;stroke:#8b949e;stroke-width:1.8;stroke-dasharray:6 6;marker-end:url(#ahd)}
      .ah{fill:#57606a}.ahd{fill:#8b949e}
      @media (prefers-color-scheme: dark){
        .t-title{fill:#e6edf3}.t-sub{fill:#8b949e}.t-lane{fill:#8b949e}.t-step{fill:#e6edf3}.t-step-d{fill:#8b949e}
        .card{fill:#161b22;stroke:#30363d}.lane{fill:#12161c;stroke:#30363d}.pill{fill:#0d1117;stroke:#30363d}
        .n-blue{fill:#0d2740;stroke:#1f6feb}.n-amber{fill:#332810;stroke:#bb8009}.n-green{fill:#0f2e1a;stroke:#2ea043}.n-red{fill:#3a1a18;stroke:#e5534b}
        .edge{stroke:#8b949e}.ah{fill:#8b949e}
      }
    </style>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto"><path class="ah" d="M0,0 L9,4.5 L0,9 Z"/></marker>
    <marker id="ahd" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto"><path class="ahd" d="M0,0 L9,4.5 L0,9 Z"/></marker>
  </defs>

  <rect class="card" x="4" y="4" width="1192" height="472" rx="16"/>
  <text class="t-title" x="600" y="32" text-anchor="middle">Runtime Architecture</text>
  <text class="t-sub" x="600" y="54" text-anchor="middle">Delivery automation, AWS foundation, and Kubernetes runtime, connected with observability.</text>

  <rect class="lane" x="32" y="82" width="1136" height="96" rx="12"/>
  <text class="t-lane" x="48" y="104">SOURCE TO DELIVERY</text>
  <rect class="n-blue" x="48" y="116" width="190" height="46" rx="9"/><text class="t-step" x="143" y="144" text-anchor="middle">Pull request</text>
  <rect class="pill" x="276" y="116" width="190" height="46" rx="9"/><text class="t-step" x="371" y="144" text-anchor="middle">GitHub Actions</text>
  <rect class="pill" x="504" y="116" width="190" height="46" rx="9"/><text class="t-step" x="599" y="144" text-anchor="middle">Test &amp; scan</text>
  <rect class="pill" x="732" y="116" width="190" height="46" rx="9"/><text class="t-step" x="827" y="144" text-anchor="middle">Image publish</text>
  <rect class="n-green" x="960" y="116" width="190" height="46" rx="9"/><text class="t-step" x="1055" y="144" text-anchor="middle">GitOps sync</text>
  <path class="edge" d="M 238 139 H 276"/>
  <path class="edge" d="M 466 139 H 504"/>
  <path class="edge" d="M 694 139 H 732"/>
  <path class="edge" d="M 922 139 H 960"/>

  <rect class="lane" x="32" y="200" width="556" height="252" rx="12"/>
  <text class="t-lane" x="48" y="222">AWS FOUNDATION</text>
  <rect class="n-amber" x="48" y="252" width="150" height="134" rx="9"/><text class="t-step" x="123" y="308" text-anchor="middle">Terraform</text><text class="t-step-d" x="123" y="328" text-anchor="middle">IaC structure</text>
  <rect class="pill" x="222" y="252" width="150" height="56" rx="9"/><text class="t-step" x="297" y="276" text-anchor="middle">Network</text><text class="t-step-d" x="297" y="294" text-anchor="middle">routing, LB</text>
  <rect class="pill" x="392" y="252" width="150" height="56" rx="9"/><text class="t-step" x="467" y="276" text-anchor="middle">IAM</text><text class="t-step-d" x="467" y="294" text-anchor="middle">boundaries</text>
  <rect class="pill" x="222" y="330" width="150" height="56" rx="9"/><text class="t-step" x="297" y="354" text-anchor="middle">Storage</text><text class="t-step-d" x="297" y="372" text-anchor="middle">state, data</text>
  <rect class="pill" x="392" y="330" width="150" height="56" rx="9"/><text class="t-step" x="467" y="354" text-anchor="middle">WAF</text><text class="t-step-d" x="467" y="372" text-anchor="middle">edge control</text>
  <path class="edge" d="M 198 280 H 222"/>
  <path class="edge" d="M 198 358 H 222"/>
  <path class="edge" d="M 372 280 H 392"/>
  <path class="edge" d="M 372 358 H 392"/>

  <rect class="lane" x="612" y="200" width="556" height="252" rx="12"/>
  <text class="t-lane" x="628" y="222">KUBERNETES AND OPERATIONS</text>
  <rect class="n-green" x="628" y="252" width="132" height="134" rx="9"/><text class="t-step" x="694" y="308" text-anchor="middle">Workloads</text><text class="t-step-d" x="694" y="328" text-anchor="middle">apps, jobs, services</text>
  <rect class="pill" x="776" y="252" width="116" height="54" rx="9"/><text class="t-step" x="834" y="275" text-anchor="middle">Metrics</text><text class="t-step-d" x="834" y="293" text-anchor="middle">Prometheus</text>
  <rect class="pill" x="908" y="252" width="116" height="54" rx="9"/><text class="t-step" x="966" y="275" text-anchor="middle">Dashboards</text><text class="t-step-d" x="966" y="293" text-anchor="middle">Grafana</text>
  <rect class="pill" x="776" y="320" width="116" height="54" rx="9"/><text class="t-step" x="834" y="343" text-anchor="middle">Logs</text><text class="t-step-d" x="834" y="361" text-anchor="middle">events, traces</text>
  <rect class="pill" x="908" y="320" width="116" height="54" rx="9"/><text class="t-step" x="966" y="343" text-anchor="middle">Alerts</text><text class="t-step-d" x="966" y="361" text-anchor="middle">Alertmanager</text>
  <rect class="n-red" x="1040" y="252" width="112" height="122" rx="9"/><text class="t-step" x="1096" y="305" text-anchor="middle">Incident</text><text class="t-step-d" x="1096" y="323" text-anchor="middle">review, runbooks</text>
  <path class="edge" d="M 760 279 H 776"/>
  <path class="edge" d="M 760 347 H 776"/>
  <path class="edge" d="M 892 279 H 908"/>
  <path class="edge" d="M 892 347 H 908"/>
  <path class="edge" d="M 1024 279 H 1040"/>
  <path class="edge" d="M 1024 347 H 1040"/>

  <path class="edge" d="M 1055 162 C 1055 210, 770 206, 696 250"/>
  <path class="edge-d" d="M 590 318 H 626"/>
</svg>
