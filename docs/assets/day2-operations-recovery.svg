<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 380" role="img" aria-labelledby="t d" width="100%">
  <title id="t">Day-2 operations and recovery</title>
  <desc id="d">An eight-step incident recovery loop: alert, triage, recent-change review, metrics, logs, mitigation, recovery verification, and documentation, with a learn-and-improve feedback path back to detection.</desc>
  <defs>
    <style>
      text{font-family:ui-sans-serif,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
      .t-title{font-size:24px;font-weight:600;fill:#1f2328}
      .t-sub{font-size:13px;font-weight:400;fill:#656d76}
      .t-step{font-size:14px;font-weight:600;fill:#1f2328}
      .t-step-d{font-size:12.5px;font-weight:400;fill:#656d76}
      .t-fb{font-size:12px;font-weight:600;letter-spacing:.4px;fill:#8957e5}
      .card{fill:#f6f8fa;stroke:#d0d7de;stroke-width:1}
      .pill{fill:#ffffff;stroke:#d0d7de;stroke-width:1}
      .n-blue{fill:#ddeefc;stroke:#54aeff;stroke-width:1.4}
      .n-green{fill:#d7f0de;stroke:#3fb950;stroke-width:1.4}
      .n-red{fill:#fbe0de;stroke:#e5534b;stroke-width:1.4}
      .edge{fill:none;stroke:#57606a;stroke-width:2;marker-end:url(#ah)}
      .fb{fill:none;stroke:#8957e5;stroke-width:2;stroke-dasharray:7 6;marker-end:url(#ahf)}
      .ah{fill:#57606a}.ahf{fill:#8957e5}
      @media (prefers-color-scheme: dark){
        .t-title{fill:#e6edf3}.t-sub{fill:#8b949e}.t-step{fill:#e6edf3}.t-step-d{fill:#8b949e}
        .card{fill:#161b22;stroke:#30363d}.pill{fill:#0d1117;stroke:#30363d}
        .n-blue{fill:#0d2740;stroke:#1f6feb}.n-green{fill:#0f2e1a;stroke:#2ea043}.n-red{fill:#3a1a18;stroke:#e5534b}
        .edge{stroke:#8b949e}.ah{fill:#8b949e}
        .fb{stroke:#bc8cff}.ahf{fill:#bc8cff}.t-fb{fill:#bc8cff}
      }
    </style>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto"><path class="ah" d="M0,0 L9,4.5 L0,9 Z"/></marker>
    <marker id="ahf" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto"><path class="ahf" d="M0,0 L9,4.5 L0,9 Z"/></marker>
  </defs>

  <rect class="card" x="4" y="4" width="1192" height="372" rx="16"/>
  <text class="t-title" x="600" y="32" text-anchor="middle">Day-2 Operations and Recovery</text>
  <text class="t-sub" x="600" y="54" text-anchor="middle">Detection, triage, mitigation, recovery, and documented follow-up.</text>

  <rect class="n-red" x="48" y="92" width="242" height="70" rx="11"/><text class="t-step" x="169" y="122" text-anchor="middle">Alert</text><text class="t-step-d" x="169" y="144" text-anchor="middle">or user report</text>
  <rect class="pill" x="335" y="92" width="242" height="70" rx="11"/><text class="t-step" x="456" y="122" text-anchor="middle">Triage</text><text class="t-step-d" x="456" y="144" text-anchor="middle">severity, scope</text>
  <rect class="pill" x="622" y="92" width="242" height="70" rx="11"/><text class="t-step" x="743" y="122" text-anchor="middle">Recent changes</text><text class="t-step-d" x="743" y="144" text-anchor="middle">deploys, IaC</text>
  <rect class="n-blue" x="909" y="92" width="242" height="70" rx="11"/><text class="t-step" x="1030" y="122" text-anchor="middle">Metrics</text><text class="t-step-d" x="1030" y="144" text-anchor="middle">dashboards</text>

  <rect class="n-blue" x="909" y="210" width="242" height="70" rx="11"/><text class="t-step" x="1030" y="240" text-anchor="middle">Logs</text><text class="t-step-d" x="1030" y="262" text-anchor="middle">workload clues</text>
  <rect class="n-green" x="622" y="210" width="242" height="70" rx="11"/><text class="t-step" x="743" y="240" text-anchor="middle">Mitigate</text><text class="t-step-d" x="743" y="262" text-anchor="middle">fix or rollback</text>
  <rect class="n-green" x="335" y="210" width="242" height="70" rx="11"/><text class="t-step" x="456" y="240" text-anchor="middle">Verify</text><text class="t-step-d" x="456" y="262" text-anchor="middle">recovery</text>
  <rect class="pill" x="48" y="210" width="242" height="70" rx="11"/><text class="t-step" x="169" y="240" text-anchor="middle">Document</text><text class="t-step-d" x="169" y="262" text-anchor="middle">cause, actions</text>

  <path class="edge" d="M 290 127 H 335"/>
  <path class="edge" d="M 577 127 H 622"/>
  <path class="edge" d="M 864 127 H 909"/>
  <path class="edge" d="M 1030 162 V 210"/>
  <path class="edge" d="M 909 245 H 864"/>
  <path class="edge" d="M 622 245 H 577"/>
  <path class="edge" d="M 335 245 H 290"/>

  <path class="fb" d="M 130 210 C 64 196, 64 176, 130 162"/>
  <text class="t-fb" x="150" y="191">learn &amp; improve</text>

  <text class="t-sub" x="600" y="344" text-anchor="middle">Practices: health checks, rollout monitoring, capacity and cost review, alert triage, incident support, runbook maintenance, and restore planning.</text>
</svg>
