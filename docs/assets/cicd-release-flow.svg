<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">CI/CD and release flow</title>
  <desc id="desc">A CI/CD release flow showing pull request, validation, test checks, security scans, image publishing, GitOps update, Kubernetes rollout, and monitoring.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#335c81" />
    </marker>
    <style>
      .canvas { fill: #ffffff; }
      .title { fill: #172033; font: 700 28px "Segoe UI", Arial, sans-serif; }
      .subtitle { fill: #536173; font: 400 15px "Segoe UI", Arial, sans-serif; }
      .node { fill: #f7f9fc; stroke: #a9b8cc; stroke-width: 1.5; rx: 8; }
      .node-blue { fill: #eef5ff; stroke: #6c9bd2; }
      .node-green { fill: #eef8f3; stroke: #58a77a; }
      .node-red { fill: #fff1f1; stroke: #d77272; }
      .num { fill: #ffffff; font: 700 14px "Segoe UI", Arial, sans-serif; }
      .num-bg { fill: #2f5d8c; }
      .label { fill: #172033; font: 700 15px "Segoe UI", Arial, sans-serif; }
      .small { fill: #536173; font: 400 12.5px "Segoe UI", Arial, sans-serif; }
      .line { fill: none; stroke: #335c81; stroke-width: 2.2; marker-end: url(#arrow); }
      .soft { fill: #fbfcfe; stroke: #d5dde8; stroke-width: 1.2; rx: 8; }
    </style>
  </defs>

  <rect class="canvas" width="1200" height="360" />
  <text class="title" x="40" y="52">CI/CD And Release Flow</text>
  <text class="subtitle" x="40" y="78">Release work is represented as gated evidence, not just automation that moves code.</text>

  <rect class="soft" x="40" y="112" width="1120" height="154" />
  <g>
    <rect class="node node-blue" x="62" y="148" width="118" height="76" />
    <circle class="num-bg" cx="84" cy="166" r="14" />
    <text class="num" x="80" y="171">1</text>
    <text class="label" x="94" y="184">Pull request</text>
    <text class="small" x="94" y="206">review scope</text>
  </g>
  <g>
    <rect class="node" x="206" y="148" width="118" height="76" />
    <circle class="num-bg" cx="228" cy="166" r="14" />
    <text class="num" x="224" y="171">2</text>
    <text class="label" x="238" y="184">Validation</text>
    <text class="small" x="238" y="206">lint, config</text>
  </g>
  <g>
    <rect class="node" x="350" y="148" width="118" height="76" />
    <circle class="num-bg" cx="372" cy="166" r="14" />
    <text class="num" x="368" y="171">3</text>
    <text class="label" x="382" y="184">Tests</text>
    <text class="small" x="382" y="206">smoke checks</text>
  </g>
  <g>
    <rect class="node node-red" x="494" y="148" width="118" height="76" />
    <circle class="num-bg" cx="516" cy="166" r="14" />
    <text class="num" x="512" y="171">4</text>
    <text class="label" x="526" y="184">Scan</text>
    <text class="small" x="526" y="206">image, IaC, SBOM</text>
  </g>
  <g>
    <rect class="node" x="638" y="148" width="118" height="76" />
    <circle class="num-bg" cx="660" cy="166" r="14" />
    <text class="num" x="656" y="171">5</text>
    <text class="label" x="670" y="184">Artifact</text>
    <text class="small" x="670" y="206">tag, publish</text>
  </g>
  <g>
    <rect class="node node-green" x="782" y="148" width="118" height="76" />
    <circle class="num-bg" cx="804" cy="166" r="14" />
    <text class="num" x="800" y="171">6</text>
    <text class="label" x="814" y="184">GitOps</text>
    <text class="small" x="814" y="206">desired state</text>
  </g>
  <g>
    <rect class="node node-green" x="926" y="148" width="118" height="76" />
    <circle class="num-bg" cx="948" cy="166" r="14" />
    <text class="num" x="944" y="171">7</text>
    <text class="label" x="958" y="184">Rollout</text>
    <text class="small" x="958" y="206">status, rollback</text>
  </g>
  <g>
    <rect class="node node-blue" x="1070" y="148" width="68" height="76" />
    <circle class="num-bg" cx="1092" cy="166" r="14" />
    <text class="num" x="1088" y="171">8</text>
    <text class="label" x="1098" y="184">Ops</text>
    <text class="small" x="1098" y="206">signals</text>
  </g>

  <path class="line" d="M 180 186 H 206" />
  <path class="line" d="M 324 186 H 350" />
  <path class="line" d="M 468 186 H 494" />
  <path class="line" d="M 612 186 H 638" />
  <path class="line" d="M 756 186 H 782" />
  <path class="line" d="M 900 186 H 926" />
  <path class="line" d="M 1044 186 H 1070" />

  <text class="small" x="72" y="302">Controls represented: source review, reproducible builds, manifest validation, vulnerability scanning, SBOM direction, signing/provenance direction, rollout status, and post-deploy health checks.</text>
</svg>
