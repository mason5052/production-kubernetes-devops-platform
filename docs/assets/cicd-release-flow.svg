<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" role="img" aria-labelledby="t d" width="100%">
  <title id="t">CI/CD and release flow</title>
  <desc id="d">An eight-step CI/CD release flow: pull request, validation, tests, security scan gate, artifact, GitOps, rollout, and operations, arranged as a serpentine pipeline that produces evidence at each step.</desc>
  <defs>
    <style>
      text{font-family:ui-sans-serif,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
      .t-title{font-size:24px;font-weight:600;fill:#1f2328}
      .t-sub{font-size:13px;font-weight:400;fill:#656d76}
      .t-step{font-size:14px;font-weight:600;fill:#1f2328}
      .t-step-d{font-size:12.5px;font-weight:400;fill:#656d76}
      .t-num{font-size:13px;font-weight:600;fill:#ffffff}
      .card{fill:#f6f8fa;stroke:#d0d7de;stroke-width:1}
      .pill{fill:#ffffff;stroke:#d0d7de;stroke-width:1}
      .n-blue{fill:#ddeefc;stroke:#54aeff;stroke-width:1.4}
      .n-amber{fill:#fbe9c7;stroke:#d4a72c;stroke-width:1.6}
      .n-purple{fill:#e7ddfb;stroke:#a371f7;stroke-width:1.4}
      .n-green{fill:#d7f0de;stroke:#3fb950;stroke-width:1.4}
      .num-bg{fill:#57606a}
      .edge{fill:none;stroke:#57606a;stroke-width:2;marker-end:url(#ah)}
      .ah{fill:#57606a}
      @media (prefers-color-scheme: dark){
        .t-title{fill:#e6edf3}.t-sub{fill:#8b949e}.t-step{fill:#e6edf3}.t-step-d{fill:#8b949e}
        .card{fill:#161b22;stroke:#30363d}.pill{fill:#0d1117;stroke:#30363d}
        .n-blue{fill:#0d2740;stroke:#1f6feb}.n-amber{fill:#332810;stroke:#bb8009}.n-purple{fill:#21183c;stroke:#a371f7}.n-green{fill:#0f2e1a;stroke:#2ea043}
        .num-bg{fill:#6e7681}
        .edge{stroke:#8b949e}.ah{fill:#8b949e}
      }
    </style>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto"><path class="ah" d="M0,0 L9,4.5 L0,9 Z"/></marker>
  </defs>

  <rect class="card" x="4" y="4" width="1192" height="352" rx="16"/>
  <text class="t-title" x="600" y="32" text-anchor="middle">CI/CD and Release Flow</text>
  <text class="t-sub" x="600" y="54" text-anchor="middle">A gated, evidence-producing release flow, not just automation that moves code.</text>

  <rect class="n-blue" x="48" y="86" width="242" height="72" rx="11"/><circle class="num-bg" cx="74" cy="112" r="13"/><text class="t-num" x="74" y="117" text-anchor="middle">1</text><text class="t-step" x="96" y="117">Pull request</text><text class="t-step-d" x="70" y="142">review scope</text>
  <rect class="pill" x="335" y="86" width="242" height="72" rx="11"/><circle class="num-bg" cx="361" cy="112" r="13"/><text class="t-num" x="361" y="117" text-anchor="middle">2</text><text class="t-step" x="383" y="117">Validation</text><text class="t-step-d" x="357" y="142">lint, config</text>
  <rect class="pill" x="622" y="86" width="242" height="72" rx="11"/><circle class="num-bg" cx="648" cy="112" r="13"/><text class="t-num" x="648" y="117" text-anchor="middle">3</text><text class="t-step" x="670" y="117">Tests</text><text class="t-step-d" x="644" y="142">smoke checks</text>
  <rect class="n-amber" x="909" y="86" width="242" height="72" rx="11"/><circle class="num-bg" cx="935" cy="112" r="13"/><text class="t-num" x="935" y="117" text-anchor="middle">4</text><text class="t-step" x="957" y="117">Scan gate</text><text class="t-step-d" x="931" y="142">image, IaC, SBOM</text>

  <rect class="pill" x="909" y="200" width="242" height="72" rx="11"/><circle class="num-bg" cx="935" cy="226" r="13"/><text class="t-num" x="935" y="231" text-anchor="middle">5</text><text class="t-step" x="957" y="231">Artifact</text><text class="t-step-d" x="931" y="256">tag, publish</text>
  <rect class="n-purple" x="622" y="200" width="242" height="72" rx="11"/><circle class="num-bg" cx="648" cy="226" r="13"/><text class="t-num" x="648" y="231" text-anchor="middle">6</text><text class="t-step" x="670" y="231">GitOps</text><text class="t-step-d" x="644" y="256">desired state</text>
  <rect class="n-green" x="335" y="200" width="242" height="72" rx="11"/><circle class="num-bg" cx="361" cy="226" r="13"/><text class="t-num" x="361" y="231" text-anchor="middle">7</text><text class="t-step" x="383" y="231">Rollout</text><text class="t-step-d" x="357" y="256">status, rollback</text>
  <rect class="n-green" x="48" y="200" width="242" height="72" rx="11"/><circle class="num-bg" cx="74" cy="226" r="13"/><text class="t-num" x="74" y="231" text-anchor="middle">8</text><text class="t-step" x="96" y="231">Operations</text><text class="t-step-d" x="70" y="256">post-deploy signals</text>

  <path class="edge" d="M 290 122 H 335"/>
  <path class="edge" d="M 577 122 H 622"/>
  <path class="edge" d="M 864 122 H 909"/>
  <path class="edge" d="M 1030 158 V 200"/>
  <path class="edge" d="M 909 236 H 864"/>
  <path class="edge" d="M 622 236 H 577"/>
  <path class="edge" d="M 335 236 H 290"/>

  <text class="t-sub" x="600" y="320" text-anchor="middle">Each step produces evidence: review, reproducible build, validation, vulnerability scanning, SBOM and signing, rollout status, and post-deploy health.</text>
</svg>
