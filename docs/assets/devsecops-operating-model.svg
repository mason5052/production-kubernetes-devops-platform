<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 446" role="img" aria-labelledby="t d" width="100%">
  <title id="t">DevSecOps operating model</title>
  <desc id="d">A four-phase production DevSecOps loop: build and review, secure, deliver, operate and improve, with a continuous feedback arc and a cross-cutting controls band feeding the secure, deliver, and operate phases.</desc>
  <defs>
    <style>
      text{font-family:ui-sans-serif,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
      .t-title{font-size:24px;font-weight:600;fill:#1f2328}
      .t-phase{font-size:15px;font-weight:600}
      .t-step{font-size:13px;font-weight:600;fill:#1f2328}
      .t-step-d{font-size:13px;font-weight:400;fill:#656d76}
      .t-found{font-size:12px;font-weight:600;fill:#656d76;letter-spacing:1.2px}
      .t-fb{font-size:12px;font-weight:600;letter-spacing:.4px;fill:#8957e5}
      .card{fill:#f6f8fa;stroke:#d0d7de;stroke-width:1}
      .pill{fill:#ffffff;stroke:#d0d7de;stroke-width:1}
      .found{fill:#eef1f5;stroke:#d0d7de;stroke-width:1}
      .p-build{fill:#ddeefc;stroke:#54aeff;stroke-width:1.5}
      .p-secure{fill:#fbe9c7;stroke:#d4a72c;stroke-width:1.5}
      .p-deliver{fill:#e7ddfb;stroke:#a371f7;stroke-width:1.5}
      .p-operate{fill:#d7f0de;stroke:#3fb950;stroke-width:1.5}
      .tt-build{fill:#0a3069}.tt-secure{fill:#7a4f08}.tt-deliver{fill:#512a97}.tt-operate{fill:#1a5e2e}
      .edge{fill:none;stroke:#57606a;stroke-width:2;marker-end:url(#ah)}
      .edge-d{fill:none;stroke:#8b949e;stroke-width:1.8;stroke-dasharray:6 6;marker-end:url(#ahd)}
      .fb{fill:none;stroke:#8957e5;stroke-width:2;stroke-dasharray:7 6;marker-end:url(#ahf)}
      .ah{fill:#57606a}.ahd{fill:#8b949e}.ahf{fill:#8957e5}
      @media (prefers-color-scheme: dark){
        .t-title{fill:#e6edf3}.t-step{fill:#e6edf3}.t-step-d{fill:#8b949e}.t-found{fill:#8b949e}
        .card{fill:#161b22;stroke:#30363d}.pill{fill:#0d1117;stroke:#30363d}.found{fill:#1c2128;stroke:#30363d}
        .p-build{fill:#0d2740;stroke:#1f6feb}.p-secure{fill:#332810;stroke:#bb8009}.p-deliver{fill:#21183c;stroke:#a371f7}.p-operate{fill:#0f2e1a;stroke:#2ea043}
        .tt-build{fill:#9cc7ff}.tt-secure{fill:#e0b341}.tt-deliver{fill:#ccb3ff}.tt-operate{fill:#7ee787}
        .edge{stroke:#8b949e}.ah{fill:#8b949e}
        .fb{stroke:#bc8cff}.ahf{fill:#bc8cff}.t-fb{fill:#bc8cff}
      }
    </style>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto"><path class="ah" d="M0,0 L9,4.5 L0,9 Z"/></marker>
    <marker id="ahd" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto"><path class="ahd" d="M0,0 L9,4.5 L0,9 Z"/></marker>
    <marker id="ahf" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto"><path class="ahf" d="M0,0 L9,4.5 L0,9 Z"/></marker>
  </defs>

  <rect class="card" x="4" y="4" width="1192" height="438" rx="16"/>
  <text class="t-title" x="600" y="32" text-anchor="middle">DevSecOps Operating Model</text>

  <text class="t-fb" x="600" y="66" text-anchor="middle">continuous feedback</text>
  <path class="fb" d="M 1041 124 C 860 42, 340 42, 159 124"/>

  <g>
    <rect class="p-build" x="32" y="124" width="254" height="150" rx="12"/>
    <text class="t-phase tt-build" x="48" y="148">1 · Build &amp; review</text>
    <rect class="pill" x="46" y="162" width="226" height="30" rx="8"/><text class="t-step" x="58" y="182">Change<tspan class="t-step-d"> · code, config, IaC</tspan></text>
    <rect class="pill" x="46" y="200" width="226" height="30" rx="8"/><text class="t-step" x="58" y="220">Review<tspan class="t-step-d"> · validation</tspan></text>
    <rect class="pill" x="46" y="238" width="226" height="30" rx="8"/><text class="t-step" x="58" y="258">CI<tspan class="t-step-d"> · build &amp; test</tspan></text>

    <rect class="p-secure" x="326" y="124" width="254" height="150" rx="12"/>
    <text class="t-phase tt-secure" x="342" y="148">2 · Secure</text>
    <rect class="pill" x="340" y="162" width="226" height="30" rx="8"/><text class="t-step" x="352" y="182">Security gates<tspan class="t-step-d"> · scan, IaC</tspan></text>
    <rect class="pill" x="340" y="200" width="226" height="30" rx="8"/><text class="t-step" x="352" y="220">Evidence<tspan class="t-step-d"> · SBOM, signing</tspan></text>

    <rect class="p-deliver" x="620" y="124" width="254" height="150" rx="12"/>
    <text class="t-phase tt-deliver" x="636" y="148">3 · Deliver</text>
    <rect class="pill" x="634" y="162" width="226" height="30" rx="8"/><text class="t-step" x="646" y="182">GitOps<tspan class="t-step-d"> · desired state</tspan></text>
    <rect class="pill" x="634" y="200" width="226" height="30" rx="8"/><text class="t-step" x="646" y="220">Runtime<tspan class="t-step-d"> · K8s rollout</tspan></text>

    <rect class="p-operate" x="914" y="124" width="254" height="150" rx="12"/>
    <text class="t-phase tt-operate" x="930" y="148">4 · Operate &amp; improve</text>
    <rect class="pill" x="928" y="162" width="226" height="30" rx="8"/><text class="t-step" x="940" y="182">Observability<tspan class="t-step-d"> · signals</tspan></text>
    <rect class="pill" x="928" y="200" width="226" height="30" rx="8"/><text class="t-step" x="940" y="220">Incident<tspan class="t-step-d"> · triage, rollback</tspan></text>
    <rect class="pill" x="928" y="238" width="226" height="30" rx="8"/><text class="t-step" x="940" y="258">Improve<tspan class="t-step-d"> · follow-ups</tspan></text>
  </g>

  <path class="edge" d="M 286 199 H 322"/>
  <path class="edge" d="M 580 199 H 616"/>
  <path class="edge" d="M 874 199 H 910"/>

  <rect class="found" x="32" y="318" width="1136" height="86" rx="12"/>
  <text class="t-found" x="48" y="342">CROSS-CUTTING CONTROLS</text>
  <rect class="pill" x="48" y="352" width="352" height="38" rx="8"/><text class="t-step" x="62" y="376">Terraform / AWS<tspan class="t-step-d"> · compute, network, IAM, cost</tspan></text>
  <rect class="pill" x="424" y="352" width="352" height="38" rx="8"/><text class="t-step" x="438" y="376">Policy-as-code / RBAC / IAM<tspan class="t-step-d"> · least privilege</tspan></text>
  <rect class="pill" x="800" y="352" width="336" height="38" rx="8"/><text class="t-step" x="814" y="376">WAF / edge<tspan class="t-step-d"> · filtering, abuse defense</tspan></text>

  <path class="edge-d" d="M 453 318 V 278"/>
  <path class="edge-d" d="M 747 318 V 278"/>
  <path class="edge-d" d="M 1041 318 V 278"/>
</svg>
